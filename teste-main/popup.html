
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350, initial-scale=1.0">
  <title>Bloqueador de Sites Personalizado</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h2>Bloqueador de Sites</h2>
    <div class="site-info">
      <span id="domain">Carregando...</span>
      <button id="toggle-block" class="btn">Bloquear este site</button>
    </div>
    <div class="add-site">
      <input type="text" id="add-domain" placeholder="Adicionar domínio...">
      <button id="add-btn" class="btn">Adicionar</button>
    </div>
    <div class="blocked-list-section">
      <h3>Sites bloqueados <span id="count">(0)</span></h3>
      <ul id="sites-list"></ul>
    </div>
  </div>
</div>
<!-- Painel oculto de administração de sites bloqueados -->
<div id="admin-modal" class="modal hidden">
  <div class="modal-content">
    <h3>Administração de Sites Bloqueados</h3>
    <div id="admin-auth">
      <input type="password" id="admin-password" placeholder="Senha de administrador">
      <div id="admin-error" class="error-msg"></div>
      <div class="modal-actions">
        <button id="admin-login-btn" class="btn">Entrar</button>
        <button id="admin-cancel-btn" class="btn btn-cancel">Cancelar</button>
      </div>
    </div>
    <div id="blocked-sites-panel" class="hidden">
      <h4>Sites bloqueados</h4>
      <ul id="blocked-sites-list"></ul>
    </div>
  </div>
</div>
<button id="open-admin-modal" class="btn">Gerenciar sites bloqueados</button>
  <script src="popup.js"></script>
</body>
</html>
